<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D3 Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
    <h1>Phone Usage Explorer</h1>
    <p style="margin-left: 10px; color: #666; font-size: 12px;">
        Data collected between 09:00–16:30 (foreground app usage only)
    </p>

    <svg id="heatmap" width="700" height="350"></svg>

    <h2>Details</h2>
    <p class="hint">Hover over dots for details</p>
    <svg id="timeline" width="700" height="160"></svg>

    <div id="tooltip" style="
        position: absolute;
        background: white;
        border: 1px solid #ccc;
        padding: 5px;
        pointer-events: none;
        opacity: 0;
        ">
    </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="js/main.js"></script>
</body>
